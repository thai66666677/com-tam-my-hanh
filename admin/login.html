<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập Quản Trị - Cơm Tấm Mỹ Hạnh</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="/frontend/js/config.js"></script>
</head>
<body class="admin-body">

  <div class="admin-login-wrap">
    <div class="admin-login-box">

      <div class="admin-logo">🍚</div>
      <h1>Quản Trị Quán</h1>
      <p>Cơm Tấm Mỹ Hạnh</p>

      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="admin-username" placeholder="admin"
          onkeydown="if(event.key==='Enter') handleAdminLogin()">
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="admin-password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') handleAdminLogin()">
      </div>

      <button class="btn-submit" id="login-btn" onclick="handleAdminLogin()">
        🔐 Đăng Nhập
      </button>

      <div class="account-msg" id="login-msg"></div>

    </div>
  </div>

  <script>
    // Đã đăng nhập đủ cả 2 thứ → vào dashboard luôn
    if (localStorage.getItem('adminLoggedIn') === 'true' &&
        localStorage.getItem('adminToken')) {
      window.location.href = 'dashboard.html';
    }

    async function handleAdminLogin() {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;
      const msgEl    = document.getElementById('login-msg');
      const btn      = document.getElementById('login-btn');

      // Reset thông báo
      msgEl.textContent = '';
      msgEl.className   = 'account-msg';

      if (!username || !password) {
        msgEl.textContent = '⚠️ Vui lòng nhập đủ tên và mật khẩu!';
        msgEl.className   = 'account-msg error';
        return;
      }

      btn.disabled    = true;
      btn.textContent = '⏳ Đang đăng nhập...';

      try {
        const res  = await fetch(`${API_URL}/auth/admin-login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          msgEl.textContent = data.error || 'Sai tài khoản hoặc mật khẩu!';
          msgEl.className   = 'account-msg error';
          return;
        }

        // Lưu cả flag lẫn token
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminToken',    data.token);

        msgEl.textContent = '✅ Đăng nhập thành công!';
        msgEl.className   = 'account-msg success';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 500);

      } catch (err) {
        console.error('Lỗi đăng nhập admin:', err);
        msgEl.textContent = '⚠️ Không kết nối được server!';
        msgEl.className   = 'account-msg error';
      } finally {
        btn.disabled    = false;
        btn.textContent = '🔐 Đăng Nhập';
      }
    }
  </script>
</body>
</html>
