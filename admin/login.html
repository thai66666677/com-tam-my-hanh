<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập Quản Trị - Cơm Tấm Mỹ Hạnh</title>
  <link rel="stylesheet" href="../frontend/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
   <script src="../frontend/js/config.js"></script>  ← THÊM DÒNG NÀY
</head>
<body class="admin-body">

  <div class="admin-login-wrap">
    <div class="admin-login-box">

      <div class="admin-logo">🍚</div>
      <h1>Quản Trị Quán</h1>
      <p>Cơm Tấm Mỹ Hạnh</p>

      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="admin-user" placeholder="admin">
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="admin-pass" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') handleAdminLogin()">
      </div>

      <button class="btn-submit" onclick="handleAdminLogin()">
        🔐 Đăng Nhập
      </button>

      <div class="account-msg" id="admin-msg"></div>

    </div>
  </div>

  <script>
    // Kiểm tra đã đăng nhập chưa → chuyển thẳng vào dashboard
    if (localStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }

      async function handleAdminLogin() {
  const username = document.getElementById('admin-username')?.value.trim();
  const password = document.getElementById('admin-password')?.value;
  const msgEl    = document.getElementById('login-msg');

  if (!username || !password) {
    if (msgEl) { msgEl.textContent = 'Vui lòng nhập đủ thông tin!'; msgEl.style.color = '#e74c3c'; }
    return;
  }

  const btn = document.querySelector('.btn-submit');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Đang đăng nhập...'; }

  try {
    const res  = await fetch(`${API_URL}/auth/admin-login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok) {
      if (msgEl) { msgEl.textContent = data.error || 'Sai tài khoản hoặc mật khẩu!'; msgEl.style.color = '#e74c3c'; }
      return;
    }

    // Lưu cả 2: flag cũ (tương thích) + token mới (bảo mật)
    localStorage.setItem('adminLoggedIn', 'true');
    localStorage.setItem('adminToken', data.token); // ← QUAN TRỌNG!

    window.location.href = 'dashboard.html';

  } catch (err) {
    if (msgEl) { msgEl.textContent = 'Không kết nối được server!'; msgEl.style.color = '#e74c3c'; }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔐 Đăng Nhập'; }
  }
}
  </script>
</body>
</html>
