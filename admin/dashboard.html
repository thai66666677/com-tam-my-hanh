<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Đơn Hàng - Cơm Tấm Mỹ Hạnh</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="/frontend/js/config.js"></script>
</head>
<body class="admin-body">

  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-header-left">
        <span class="logo">🍚 Cơm Tấm Mỹ Hạnh</span>
        <span class="admin-badge">Quản trị</span>
      </div>
      <nav class="admin-nav">
        <a href="dashboard.html" class="active">📋 Đơn hàng</a>
        <a href="stats.html">📊 Thống kê</a>
        <a href="menu-manager.html">🍽️ Quản lý món</a>
        <a href="settings.html">🎨 Giao diện</a>  ← THÊM DÒNG NÀY
        <button id="btn-enable-sound" onclick="enableSound()">🔇 Bật âm thanh</button>
        <button onclick="adminLogout()">🚪 Đăng xuất</button>
      </nav>
    </div>
  </header>

  <div class="admin-main">

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">🆕</span>
        <div>
          <div class="stat-num" id="stat-new">0</div>
          <div class="stat-label">Đơn mới</div>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <div>
          <div class="stat-num" id="stat-confirmed">0</div>
          <div class="stat-label">Đã xác nhận</div>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🎉</span>
        <div>
          <div class="stat-num" id="stat-done">0</div>
          <div class="stat-label">Hoàn thành</div>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">💰</span>
        <div>
          <div class="stat-num" id="stat-revenue">0đ</div>
          <div class="stat-label">Doanh thu hôm nay</div>
        </div>
      </div>
    </div>

    <div class="admin-filter">
      <button class="filter-btn active" data-status="all">Tất cả</button>
      <button class="filter-btn" data-status="new">🆕 Đơn mới</button>
      <button class="filter-btn" data-status="confirmed">✅ Xác nhận</button>
      <button class="filter-btn" data-status="done">🎉 Hoàn thành</button>
      <button class="filter-btn" data-status="cancelled">❌ Đã hủy</button>
    </div>

    <div id="orders-container">
      <div class="empty-cart"><p>⏳ Đang tải đơn hàng...</p></div>
    </div>

  </div>

  <script>
    // ===== BẢO VỆ TRANG =====
    // Kiểm tra cả adminLoggedIn lẫn adminToken
    const _loggedIn = localStorage.getItem('adminLoggedIn') === 'true';
    const _token    = localStorage.getItem('adminToken');

    if (!_loggedIn || !_token) {
      // Xóa hết dữ liệu cũ rồi về login
      localStorage.removeItem('adminLoggedIn');
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    }

    // ===== LOGOUT =====
    function adminLogout() {
      localStorage.removeItem('adminLoggedIn');
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    }

    // ===== LẤY HEADERS ADMIN =====
    function getAdminHeaders() {
      const token = localStorage.getItem('adminToken');
      if (!token) {
        adminLogout();
        return null;
      }
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
    }

    // ===== FORMAT TIỀN =====
    function formatPrice(price) {
      return price.toLocaleString('vi-VN') + 'đ';
    }

    const statusLabel = {
      new:       '🆕 Đơn mới',
      confirmed: '✅ Đã xác nhận',
      done:      '🎉 Hoàn thành',
      cancelled: '❌ Đã hủy'
    };

    let currentFilter    = 'all';
    let soundEnabled     = false;
    let previousNewCount = -1;

    // ===== ÂM THANH =====
    function enableSound() {
      soundEnabled = true;
      const btn = document.getElementById('btn-enable-sound');
      btn.textContent = '🔊 Đã bật âm thanh';
      btn.disabled    = true;
    }

    function playNotificationSound() {
      if (!soundEnabled) return;
      try {
        const ctx  = new (window.AudioContext || window.webkitAudioContext)();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880,  ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(880,  ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.8, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch (err) {
        console.log('Không phát được âm thanh:', err.message);
      }
    }

    // ===== TẢI ĐƠN HÀNG =====
    async function loadOrders() {
      const headers = getAdminHeaders();
      if (!headers) return;

      try {
        const res = await fetch(`${API_URL}/orders`, { headers });

        if (res.status === 401 || res.status === 403) {
          alert('⚠️ Phiên đăng nhập hết hạn. Vui lòng đăng nhập lại!');
          adminLogout();
          return;
        }

        if (!res.ok) throw new Error('Lỗi ' + res.status);

        const orders = await res.json();
        renderOrders(orders);

      } catch (err) {
        console.error('Lỗi tải đơn hàng:', err);
        document.getElementById('orders-container').innerHTML = `
          <div class="empty-cart">
            <p>⚠️ Không kết nối được server</p>
            <p style="color:#aaa;font-size:0.85rem;">${err.message}</p>
          </div>
        `;
      }
    }

    // ===== RENDER DANH SÁCH ĐƠN =====
    function renderOrders(orders) {
      const today    = new Date().toDateString();
      const newCount = orders.filter(o => o.status === 'new').length;

      // Âm thanh khi có đơn mới
      if (previousNewCount !== -1 && newCount > previousNewCount) {
        playNotificationSound();
        showAdminToast(`🔔 Có ${newCount - previousNewCount} đơn mới!`);
      }
      previousNewCount = newCount;

      // Thống kê
      document.getElementById('stat-new').textContent =
        newCount;
      document.getElementById('stat-confirmed').textContent =
        orders.filter(o => o.status === 'confirmed').length;
      document.getElementById('stat-done').textContent =
        orders.filter(o => o.status === 'done').length;
      document.getElementById('stat-revenue').textContent =
        formatPrice(
          orders
            .filter(o => o.status === 'done' && new Date(o.createdAt).toDateString() === today)
            .reduce((sum, o) => sum + o.total, 0)
        );

      // Lọc
      const filtered = currentFilter === 'all'
        ? orders
        : orders.filter(o => o.status === currentFilter);

      const container = document.getElementById('orders-container');

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-cart"><p>📭 Chưa có đơn hàng nào</p></div>
        `;
        return;
      }

      container.innerHTML = filtered.map(order => `
        <div class="admin-order-card status-border-${order.status}">

          <div class="admin-order-header">
            <div>
              <strong>${order.id}</strong>
              <span class="order-status status-${order.status}">
                ${statusLabel[order.status]}
              </span>
            </div>
            <span class="order-time">
              ${new Date(order.createdAt).toLocaleString('vi-VN')}
            </span>
          </div>

          <div class="admin-order-body">
            <div class="customer-info">
              <p>👤 <strong>${order.customer.name}</strong></p>
              <p>📞 <a href="tel:${order.customer.phone}">${order.customer.phone}</a></p>
              <p>📍 ${order.customer.address || 'Đến lấy tại quán'}</p>
              ${order.customer.note ? `<p>📝 <em>${order.customer.note}</em></p>` : ''}
              <p>💳 ${order.payment === 'cod' ? 'Tiền mặt' : 'Chuyển khoản QR'}</p>
            </div>
            <div class="order-items-list">
              ${order.items.map(item => `
                <div class="admin-item-row">
                  <span>${item.name} x${item.quantity}</span>
                  <span>${formatPrice(item.price * item.quantity)}</span>
                </div>
              `).join('')}
              <div class="admin-item-row total-row total-final">
                <span>Tổng cộng</span>
                <span>${formatPrice(order.total)}</span>
              </div>
            </div>
          </div>

          <div class="admin-order-actions">
            ${order.status === 'new' ? `
              <button class="action-btn confirm" onclick="updateStatus('${order.id}', 'confirmed')">✅ Xác nhận</button>
              <button class="action-btn cancel"  onclick="updateStatus('${order.id}', 'cancelled')">❌ Hủy đơn</button>
            ` : ''}
            ${order.status === 'confirmed' ? `
              <button class="action-btn done"   onclick="updateStatus('${order.id}', 'done')">🎉 Hoàn thành</button>
              <button class="action-btn cancel" onclick="updateStatus('${order.id}', 'cancelled')">❌ Hủy đơn</button>
            ` : ''}
            ${order.status === 'done' || order.status === 'cancelled' ? `
              <span class="action-done">Đơn đã kết thúc</span>
            ` : ''}
          </div>

        </div>
      `).join('');
    }

    // ===== CẬP NHẬT TRẠNG THÁI =====
    async function updateStatus(orderId, newStatus) {
      const headers = getAdminHeaders();
      if (!headers) return;

      try {
        const res = await fetch(`${API_URL}/orders/${orderId}`, {
          method: 'PATCH',
          headers,
          body: JSON.stringify({ status: newStatus })
        });

        if (res.status === 401 || res.status === 403) {
          alert('⚠️ Phiên đăng nhập hết hạn!');
          adminLogout();
          return;
        }

        if (!res.ok) {
          const data = await res.json();
          alert(data.error || 'Cập nhật thất bại!');
          return;
        }

        const statusMsg = {
          confirmed: `✅ Đã xác nhận đơn ${orderId}`,
          done:      `🎉 Đơn ${orderId} hoàn thành!`,
          cancelled: `❌ Đã hủy đơn ${orderId}`
        };
        showAdminToast(statusMsg[newStatus]);
        loadOrders();

      } catch (err) {
        console.error('Lỗi cập nhật:', err);
        alert('Không kết nối được server!');
      }
    }

    // ===== TOAST =====
    function showAdminToast(message) {
      let toast = document.getElementById('admin-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id        = 'admin-toast';
        toast.className = 'admin-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ===== BỘ LỌC =====
    document.querySelectorAll('.admin-filter .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-filter .filter-btn')
          .forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        loadOrders();
      });
    });

    // ===== KHỞI ĐỘNG =====
    loadOrders();
    setInterval(loadOrders, 15000);
  </script>
</body>
</html>
