<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Món Ăn - Cơm Tấm Mỹ Hạnh</title>
  <link rel="stylesheet" href="../frontend/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
 <script src="../frontend/js/config.js"></script>
</head>
<body class="admin-body">

  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-header-left">
        <span class="logo">🍚 Cơm Tấm Mỹ Hạnh</span>
        <span class="admin-badge">Quản trị</span>
      </div>
      <nav class="admin-nav">
        <a href="dashboard.html">📋 Đơn hàng</a>
        <a href="menu-manager.html" class="active">🍽️ Quản lý món</a>
        <button onclick="adminLogout()">🚪 Đăng xuất</button>
      </nav>
    </div>
  </header>

  <div class="admin-main">

    <!-- FORM THÊM / SỬA MÓN -->
    <div class="admin-card">
      <h2 id="form-title">➕ Thêm Món Mới</h2>

     <div class="menu-form-grid">
  <div class="form-group">
    <label>Tên món *</label>
    <input type="text" id="item-name" placeholder="Cơm Tấm Sườn Bì">
  </div>
  <div class="form-group">
    <label>Giá (VNĐ) *</label>
    <input type="number" id="item-price" placeholder="35000">
  </div>
  <div class="form-group">
    <label>Danh mục *</label>
    <select id="item-category">
      <option value="com">🍚 Cơm</option>
      <option value="bun-mi">🍜 Bún & Mì</option>
      <option value="nuoc">🥤 Nước uống</option>
    </select>
  </div>
  <div class="form-group">
    <label>Icon (emoji)</label>
    <input type="text" id="item-icon" placeholder="🍚">
  </div>
  <div class="form-group">
    <label>Badge</label>
    <select id="item-badge">
      <option value="">Không có badge</option>
      <option value="hot">🔥 Bán chạy</option>
      <option value="new">⭐ Nổi bật</option>
      <option value="special">🎁 Đặc biệt</option>
      <option value="fresh">✨ Mới có</option>
    </select>
  </div>
  <div class="form-group">
    <label>Giá cũ (để trống nếu không có)</label>
    <input type="number" id="item-old-price" placeholder="65000">
  </div>
  <div class="form-group">
    <label>Số lượt đã bán hôm nay</label>
    <input type="number" id="item-sold-count" placeholder="0">
  </div>
  <div class="form-group" style="grid-column: 1/-1;">
    <label>Mô tả món</label>
    <textarea id="item-desc" placeholder="Sườn nướng mềm, bì trộn thơm..."></textarea>
  </div>
</div>

      <div class="form-actions">
        <button class="action-btn confirm" onclick="saveMenuItem()">
          💾 Lưu món
        </button>
        <button class="action-btn cancel" onclick="resetForm()">
          🔄 Làm mới
        </button>
      </div>

      <div class="account-msg" id="menu-msg"></div>
    </div>

    <!-- DANH SÁCH MÓN ĂN -->
    <div class="admin-card">
      <h2>📋 Danh Sách Món Ăn</h2>

      <div class="admin-filter">
        <button class="filter-btn active" data-cat="all">Tất cả</button>
        <button class="filter-btn" data-cat="com">🍚 Cơm</button>
        <button class="filter-btn" data-cat="bun-mi">🍜 Bún & Mì</button>
        <button class="filter-btn" data-cat="nuoc">🥤 Nước</button>
      </div>

      <div id="menu-list"></div>
    </div>

  </div>
/////////
  <script>
   if (localStorage.getItem('adminLoggedIn') !== 'true') {
  window.location.href = 'login.html';
}

function adminLogout() {
  localStorage.removeItem('adminLoggedIn');
  window.location.href = 'login.html';
}

function formatPrice(p) {
  return p.toLocaleString('vi-VN') + 'đ';
}

let editingId  = null;
let currentCat = 'all';
let menuItems  = [];

// ===== TẢI MENU TỪ API =====
async function loadMenuItems() {
  try {
    const res = await fetch(`${API_URL}/menu`);
    menuItems = await res.json();
    renderMenuList();
  } catch (err) {
    alert('Không kết nối được server!');
  }
}

// ===== RENDER DANH SÁCH MÓN =====
function renderMenuList() {
  const filtered = currentCat === 'all'
    ? menuItems
    : menuItems.filter(item => item.category === currentCat);

  const list = document.getElementById('menu-list');

  if (filtered.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#999;padding:20px">Chưa có món nào</p>';
    return;
  }

  list.innerHTML = filtered.map(item => `
    <div class="menu-manage-row">
      <span class="menu-icon">${item.icon || '🍽️'}</span>
      <div class="menu-manage-info">
        <strong>${item.name}</strong>
        <span>${item.desc || ''}</span>
      </div>
      <span class="menu-manage-cat">${getCatLabel(item.category)}</span>
      <span class="menu-manage-price">${formatPrice(item.price)}</span>
      <div class="menu-manage-actions">
        <button class="action-btn confirm" onclick="editItem('${item.id}')">✏️ Sửa</button>
        <button class="action-btn cancel"  onclick="deleteItem('${item.id}', '${item.name}')">🗑️ Xóa</button>
      </div>
    </div>
  `).join('');
}

function getCatLabel(cat) {
  return { com: '🍚 Cơm', 'bun-mi': '🍜 Bún & Mì', nuoc: '🥤 Nước' }[cat] || cat;
}

// ===== LƯU MÓN (Thêm hoặc Sửa) =====
async function saveMenuItem() {
  const name     = document.getElementById('item-name').value.trim();
  const price    = document.getElementById('item-price').value;
  const category = document.getElementById('item-category').value;
  const icon     = document.getElementById('item-icon').value.trim()     || '🍽️';
  const desc     = document.getElementById('item-desc').value.trim();
  const badge    = document.getElementById('item-badge').value;
  const oldPrice = document.getElementById('item-old-price').value;
  const msg      = document.getElementById('menu-msg');

  if (!name || !price) {
    msg.textContent = '⚠️ Vui lòng nhập tên và giá món!';
    msg.className = 'account-msg error';
    return;
  }

  const body = { name, price: parseInt(price), category, icon, desc, badge, oldPrice: oldPrice ? parseInt(oldPrice) : null };

  try {
    let res;
    if (editingId) {
      res = await fetch(`${API_URL}/menu/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } else {
      res = await fetch(`${API_URL}/menu`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    const data = await res.json();
    if (!res.ok) {
      msg.textContent = data.error || 'Có lỗi xảy ra!';
      msg.className = 'account-msg error';
      return;
    }

    msg.textContent = editingId ? '✅ Đã cập nhật món!' : '✅ Đã thêm món mới!';
    msg.className = 'account-msg success';

    resetForm();
    await loadMenuItems(); // Reload danh sách từ Firestore
    setTimeout(() => msg.textContent = '', 2000);

  } catch (err) {
    msg.textContent = 'Không kết nối được server!';
    msg.className = 'account-msg error';
  }
}

// ===== SỬA MÓN =====
function editItem(id) {
  const item = menuItems.find(i => i.id === id);
  if (!item) return;

  editingId = id;
  document.getElementById('item-name').value     = item.name;
  document.getElementById('item-price').value    = item.price;
  document.getElementById('item-category').value = item.category;
  document.getElementById('item-icon').value     = item.icon || '';
  document.getElementById('item-desc').value     = item.desc || '';
  document.getElementById('item-badge').value    = item.badge || '';
  document.getElementById('item-old-price').value = item.oldPrice || '';
  document.getElementById('form-title').textContent = '✏️ Sửa Món Ăn';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== XÓA MÓN =====
async function deleteItem(id, name) {
  if (!confirm(`Xóa món "${name}" khỏi menu?`)) return;

  try {
    const res = await fetch(`${API_URL}/menu/${id}`, { method: 'DELETE' });
    const data = await res.json();

    if (!res.ok) {
      alert(data.error || 'Xóa thất bại!');
      return;
    }

    await loadMenuItems();
  } catch (err) {
    alert('Không kết nối được server!');
  }
}

// ===== RESET FORM =====
function resetForm() {
  editingId = null;
  ['item-name','item-price','item-icon','item-desc','item-old-price'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('item-category').value = 'com';
  document.getElementById('item-badge').value    = '';
  document.getElementById('form-title').textContent = '➕ Thêm Món Mới';
}

// ===== BỘ LỌC DANH MỤC =====
document.querySelectorAll('.admin-filter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.admin-filter .filter-btn')
      .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderMenuList();
  });
});

// ===== KHỞI ĐỘNG =====
loadMenuItems();
  </script>/////
</body>
</html>
